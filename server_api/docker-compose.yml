services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chinese-sale-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=MyChineseSale2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "MyChineseSale2026!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: chinese-sale-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chinese-sale-api
    ports:
      - "4459:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ChineseSaleDB;User Id=sa;Password=MyChineseSale2026!;TrustServerCertificate=True;
      - Redis__ConnectionString=redis:6379
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started